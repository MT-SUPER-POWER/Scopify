services:
  frontend:
    container_name: ${FRONTEND_CONTAINER_NAME:-scopify-web}
    image: oven/bun:1.2
    working_dir: /app
    environment:
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      APP_CFG_BACKEND_HOST: ${BACKEND_PUBLIC_HOST:-127.0.0.1}
      APP_CFG_BACKEND_PORT: ${BACKEND_PUBLIC_PORT:-3838}
      NEXT_TELEMETRY_DISABLED: "1"
      SCOPIFY_SKIP_ELECTRON_INSTALL: "1"
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    volumes:
      - .:/app
      - scopify-node-modules:/app/node_modules
      - scopify-bun-cache:/root/.bun/install/cache
    command: sh -lc "bun install && bun run build:web && bunx serve renderer -l tcp://0.0.0.0:${FRONTEND_PORT:-3000}"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - scopify-network

  backend:
    container_name: ${BACKEND_CONTAINER_NAME:-scopify-netease-api}
    build:
      context: ./backend/api-enhanced
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-3838}:${BACKEND_PORT:-3838}"
    environment:
      PORT: ${BACKEND_PORT:-3838}
      HOST: 0.0.0.0
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
    restart: unless-stopped
    networks:
      - scopify-network

volumes:
  scopify-node-modules:
  scopify-bun-cache:

networks:
  scopify-network:
    driver: bridge
