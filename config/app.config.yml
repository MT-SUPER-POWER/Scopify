app:
  gpuAcceleration: true
  devTools: false
  closeAction: 2
backend:
  port: 3232
  host: 127.0.0.1
  autoStart: true
frontend:
  devPort: 3000
  host: 127.0.0.1
logging:
  level: info
  format: '[{y}-{m}-{d} {h}:{i}:{s}.{ms}] [{level}] {text}'
  keepDays: 25
network:
  timeout: 5000
  max_retries: 1
  retry_delay: 500
