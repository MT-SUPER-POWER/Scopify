app:
  gpuAcceleration: true
  devTools: false
  closeAction: 2
  locale: zh-CN
backend:
  port: 3838
  host: 127.0.0.1
  autoStart: true
frontend:
  devPort: 3000
  host: 127.0.0.1
logging:
  level: info
  format: "[{y}-{m}-{d} {h}:{i}:{s}.{ms}] [{level}] {text}"
  keepDays: 7
network:
  timeout: 5000
  max_retries: 1
  retry_delay: 500
  randomCNIP: false
  proxyMode: system
  proxyUrl: ""
