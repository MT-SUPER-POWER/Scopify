
# Scopify 应用配置文件
# 可通过环境变量覆盖各配置项

[app]
# GPU 加速（环境变量：GPU_ACCELERATION）
gpuAcceleration = true
# 开发工具（环境变量：DEV_TOOLS）
devTools = false
# minize: 0 & quit : 1
closeAction = 0 # 点击关闭是最小化还是退出

[backend]
# 后端服务端口（环境变量：BACKEND_DEFAULT_PORT）
port = 3838
# 后端服务主机
host = "127.0.0.1"
# 是否自动启动后端（环境变量：BACKEND_AUTO_START）
autoStart = true

[frontend]
# 前端开发服务端口（环境变量：NEXT_PORT）
devPort = 3000
# 前端主机
host = "127.0.0.1"

[logging]
# 日志级别：debug, info, warn, error（环境变量：LOG_LEVEL）
level = "info"
# 是否启用日志文件（环境变量：LOG_FILE）
enableFile = false
